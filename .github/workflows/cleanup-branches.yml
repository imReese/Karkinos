name: One-time branch cleanup

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  cleanup:
    name: Delete obsolete branches
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Delete every branch except main
        run: |
          git push origin --delete \
            agent/docs-bilingual-index \
            agent/docs-bilingual-index-v2 \
            agent/docs-governance \
            agent/docs-governance-v2 \
            agent/docs-governance-v3 \
            codex/account-truth-template-docs
