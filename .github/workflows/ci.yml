name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  python-quality:
    name: Python changed-file quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Install quality dependencies
        run: uv sync --extra dev --frozen

      - name: Check changed Python files
        shell: bash
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
        run: |
          set -euo pipefail
          if [[ -z "${BASE_SHA}" || "${BASE_SHA}" =~ ^0+$ ]]; then
            BASE_SHA="$(git rev-list --max-parents=0 HEAD)"
          fi
          mapfile -t python_files < <(
            git diff --name-only --diff-filter=ACMR "${BASE_SHA}" "${GITHUB_SHA}" -- '*.py'
          )
          if (( ${#python_files[@]} == 0 )); then
            echo "No changed Python files to check."
            exit 0
          fi
          uv run black --check "${python_files[@]}"
          uv run isort --check-only "${python_files[@]}"

  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Install backend dependencies
        run: uv sync --extra server --extra dev --frozen

      - name: Run server route tests
        run: uv run python -m pytest tests/test_server_routes.py

      - name: Run deterministic Profit Discipline smoke path
        run: uv run python -m pytest tests/test_profit_discipline_smoke.py

      - name: Run backend test suite
        run: |
          mkdir -p reports/ci
          uv run python -m pytest --cov --cov-report=term --cov-report=xml \
            --junitxml=reports/ci/backend-junit.xml

      - name: Upload backend test evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: backend-test-evidence
          path: |
            reports/ci/backend-junit.xml
            reports/ci/coverage.xml
          if-no-files-found: error

  dependency-audit:
    name: Production dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install uv and locked audit tooling
        run: |
          python -m pip install uv
          uv sync --extra server --extra dev --frozen

      - name: Audit locked Python production dependencies
        run: |
          uv export --frozen --extra server --no-dev --no-emit-project \
            --no-hashes --output-file "${RUNNER_TEMP}/requirements.txt"
          uv run --extra dev pip-audit \
            --requirement "${RUNNER_TEMP}/requirements.txt" \
            --progress-spinner=off

      - name: Audit npm production dependencies
        run: npm --prefix web audit --omit=dev --audit-level=moderate

  trading-safety:
    name: Trading safety invariants
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Install backend dependencies
        run: uv sync --extra server --extra dev --frozen

      - name: Run fail-closed trading safety tests
        run: |
          mkdir -p reports/ci
          uv run python -m pytest -m trading_safety \
            --junitxml=reports/ci/trading-safety-junit.xml

      - name: Upload trading safety evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trading-safety-evidence
          path: reports/ci/trading-safety-junit.xml
          if-no-files-found: error

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix web

      - name: Check frontend formatting
        run: npm --prefix web run format:check

      - name: Build frontend
        run: npm --prefix web run build

      - name: Run frontend tests
        run: |
          mkdir -p reports/ci
          npm --prefix web run test -- --reporter=junit --outputFile=../reports/ci/frontend-junit.xml

      - name: Upload frontend test evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: frontend-test-evidence
          path: reports/ci/frontend-junit.xml
          if-no-files-found: error

  docker-runtime:
    name: Docker runtime smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build locked runtime image
        run: docker build --tag karkinos:ci .

      - name: Start runtime without live scheduler
        run: |
          mkdir -p "${RUNNER_TEMP}/karkinos-data"
          runtime_uid="$(docker run --rm --entrypoint id karkinos:ci -u)"
          runtime_gid="$(docker run --rm --entrypoint id karkinos:ci -g)"
          chmod 0700 "${RUNNER_TEMP}/karkinos-data"
          sudo chown "${runtime_uid}:${runtime_gid}" "${RUNNER_TEMP}/karkinos-data"
          printf '{}\n' > "${RUNNER_TEMP}/karkinos-config.json"
          docker run --detach --name karkinos-ci \
            --publish 127.0.0.1:8000:8000 \
            --volume "${RUNNER_TEMP}/karkinos-data:/app/data/store" \
            --volume "${RUNNER_TEMP}/karkinos-config.json:/app/config.json:ro" \
            karkinos:ci python -m server --no-live

      - name: Verify non-root fail-closed runtime
        run: |
          test "$(docker inspect --format '{{.Config.User}}' karkinos-ci)" = "karkinos"
          python scripts/verify_docker_runtime.py --timeout-seconds 90

      - name: Capture runtime logs
        if: always()
        run: |
          if docker container inspect karkinos-ci >/dev/null 2>&1; then
            docker logs karkinos-ci
          fi

      - name: Stop runtime
        if: always()
        run: docker rm --force karkinos-ci

  browser-safety:
    name: Browser safety smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install uv
        run: python -m pip install uv

      - name: Install backend and frontend dependencies
        run: |
          uv sync --extra server --extra dev --frozen
          npm ci --prefix web

      - name: Install Chromium
        run: npx --prefix web playwright install --with-deps chromium

      - name: Build product frontend
        run: npm --prefix web run build

      - name: Run browser safety smoke
        run: npm --prefix web run test:e2e

      - name: Upload browser evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: browser-safety-evidence
          path: |
            reports/ci/playwright-junit.xml
            web/test-results/
          if-no-files-found: warn

  acceptance-evidence:
    name: Acceptance evidence
    needs: [backend, frontend, trading-safety]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Install acceptance dependencies
        run: uv sync --extra server --extra dev --frozen

      - name: Download backend test evidence
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: backend-test-evidence
          path: reports/ci

      - name: Download frontend test evidence
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: frontend-test-evidence
          path: reports/ci

      - name: Run acceptance audit report
        run: |
          uv run python scripts/export_acceptance_audit.py --audit all \
            --verify-evidence \
            --backend-junit reports/ci/backend-junit.xml \
            --frontend-junit reports/ci/frontend-junit.xml \
            --pretty \
            --output reports/ci/acceptance-audit.json

      - name: Upload acceptance evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: acceptance-evidence
          path: reports/ci/acceptance-audit.json
          if-no-files-found: error

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Scan git history with Gitleaks
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/repo" \
            ghcr.io/gitleaks/gitleaks:v8.30.1 \
            detect --source /repo --redact --verbose

      - name: Scan working tree with Gitleaks
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/repo" \
            ghcr.io/gitleaks/gitleaks:v8.30.1 \
            detect --source /repo --no-git --redact --verbose

  hygiene:
    name: Repository hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check documentation health
        run: python scripts/check_docs_health.py

      - name: Check tracked private artifacts
        shell: bash
        run: |
          set -euo pipefail

          forbidden_pattern='(^|/)(\.env$|\.env\.local$|\.env\.production$|.*\.(db|sqlite|duckdb)$|data/store/|logs/|exports/|screenshots/|reports/|\.agents/|skills-lock\.json$)'
          tracked_forbidden="$(git ls-files | grep -E "${forbidden_pattern}" || true)"

          if [[ -n "${tracked_forbidden}" ]]; then
            echo "Forbidden files are tracked:"
            echo "${tracked_forbidden}"
            exit 1
          fi

          echo "No tracked private artifacts found."
