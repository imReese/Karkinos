[project]
name = "myquant"
version = "0.1.0"
description = "个人量化交易辅助系统 - 面向中国市场"
requires-python = ">=3.12"
dependencies = [
    "akshare>=1.14",
    "tushare>=1.4",
    "pandas>=2.2",
    "numpy>=1.26",
    "matplotlib>=3.8",
    "pyarrow>=15.0",
    "pytest>=9.0.3",
    "pytest-asyncio>=1.3.0",
    "httpx>=0.28.1",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=4.1",
    "pre-commit>=4.0",
    "isort>=6.0",
    "black>=25.1",
]
server = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.29",
    "aiosqlite>=0.20",
    "websockets>=12.0",
    "pydantic>=2.0",
]

[tool.setuptools.packages.find]
include = [
    "core", "core.*",
    "domain", "domain.*",
    "data", "data.*",
    "strategy", "strategy.*",
    "execution", "execution.*",
    "risk", "risk.*",
    "backtest", "backtest.*",
    "analytics", "analytics.*",
    "notification", "notification.*",
    "utils", "utils.*",
    "server", "server.*",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

[dependency-groups]
dev-dependencies = [
    "pytest>=8.0",
    "pytest-cov>=4.1",
    "pre-commit>=4.0",
    "isort>=6.0",
    "black>=25.1",
]

# === isort 配置 ===
# 与 black 兼容的关键设置
[tool.isort]
profile = "black"
line_length = 88
known_first_party = ["core", "domain", "data", "strategy", "execution", "risk", "backtest", "analytics", "utils", "server"]

# === black 配置 ===
[tool.black]
line-length = 88
target-version = ["py312"]
